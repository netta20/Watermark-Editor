<!DOCTYPE html>
<html lang="ko">
<head>
    <link rel="shortcut icon" href="icon.ico" type="image/x-icon">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Watermark Editor - Mobile Optimized</title>
    <link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css" />
    <script src="https://cdn.jsdelivr.net/npm/exif-js"></script>
    <style>
        :root { --primary: #007AFF; --bg: #f2f2f7; --sidebar-bg: #ffffff; --border: #e5e5ea; }
        
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        
        body { 
            font-family: "Pretendard Variable", Pretendard, -apple-system, sans-serif; 
            background: var(--bg); margin: 0; padding: 0; height: 100vh; 
        }

        .main-container { display: flex; width: 100%; height: 100vh; flex-direction: row; }

        /* 프리뷰 영역 */
        .preview-area { 
            flex: 1; display: flex; align-items: center; justify-content: center; 
            padding: 20px; background: #d1d1d6; overflow: hidden; position: relative;
        }
        #canvas-container { max-width: 100%; max-height: 100%; display: none; box-shadow: 0 10px 40px rgba(0,0,0,0.2); }
        canvas { display: block; max-width: 100%; max-height: 85vh; width: auto; height: auto; object-fit: contain; border-radius: 4px; }

        /* 사이드바 설정 영역 */
        .sidebar { 
            width: 450px; background: var(--sidebar-bg); border-left: 1px solid #d1d1d6; 
            padding: 30px; display: flex; flex-direction: column; align-items: center; overflow-y: auto; 
        }
        .form-wrapper { width: 100%; max-width: 380px; }
        
        h3 { margin: 0 0 20px 0; font-size: 20px; color: #1c1c1e; text-align: center; }
        
        .upload-area { 
            border: 2px dashed #aeaeb2; padding: 20px; border-radius: 12px; cursor: pointer; 
            text-align: center; margin-bottom: 20px; display: block; font-size: 14px; font-weight: 600; color: #8e8e93;
            transition: background 0.2s;
        }
        .upload-area:active { background: #f2f2f7; }
        
        .setting-section { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 20px; }
        .full-row { grid-column: span 2; }
        .input-box { display: flex; flex-direction: column; gap: 5px; }
        .input-box label { font-size: 10px; font-weight: 700; color: #a1a1a6; text-transform: uppercase; }
        
        input[type="text"], select { 
            padding: 12px; border: 1px solid var(--border); border-radius: 8px; 
            font-size: 14px; outline: none; background: #f5f5f7; width: 100%;
        }
        input[readonly] { background: #e9e9eb; color: #8e8e93; }
        input[type="color"] { width: 100%; height: 44px; border: 1px solid var(--border); border-radius: 8px; cursor: pointer; padding: 0; background: none; }

        .palette-container { display: flex; gap: 8px; margin-top: 5px; flex-wrap: wrap; }
        .color-dot { flex: 1; min-width: 45px; height: 40px; border-radius: 8px; cursor: pointer; border: 1px solid var(--border); }
        .color-dot.active { border: 2px solid var(--primary); }
        
        .btn-download { 
            background: var(--primary); color: white; border: none; padding: 16px; 
            border-radius: 12px; font-weight: 700; cursor: pointer; font-size: 16px; width: 100%; margin-top: 10px; margin-bottom: 40px;
        }
        .btn-download:disabled { background: #d1d1d6; opacity: 0.6; }

        /* 모바일 대응 미디어 쿼리 */
        @media (max-width: 900px) {
            .main-container { flex-direction: column; overflow-y: auto; height: auto; }
            .preview-area { height: 60vh; padding: 10px; flex: none; }
            .sidebar { width: 100%; border-left: none; border-top: 1px solid #d1d1d6; padding: 20px; height: auto; overflow-y: visible; }
            canvas { max-height: 55vh; }
            .setting-section { gap: 10px; }
        }
    </style>
</head>
<body>

    <div class="main-container">
        <div class="preview-area">
            <div id="empty-msg" style="text-align: center; color: #8e8e93;"><p>사진을 업로드하여 스타일을 확인하세요.</p></div>
            <div id="canvas-container"><canvas id="mainCanvas"></canvas></div>
        </div>

        <div class="sidebar">
            <div class="form-wrapper">
                <h3>워터마크 설정</h3>
                <label class="upload-area">
                    <input type="file" id="upload" accept="image/*" style="display:none">
                    <div>이미지 업로드</div>
                </label>

                <div class="setting-section">
                    <div class="input-box full-row">
                        <label>레이아웃 스타일</label>
                        <select id="layoutType">
                            <option value="default" selected>기본 (Minimal)</option>
                            <option value="modelFocus">모델명 강조 (Center)</option>
                            <option value="classicBar">클래식 바 (One-line)</option>
                        </select>
                    </div>

                    <div class="input-box full-row">
                        <label>배경 색상</label>
                        <div class="palette-container" id="palette">
                            <div class="color-dot active" style="background: #ffffff;" data-color="#ffffff"></div>
                            <div class="color-dot" style="background: #000000;" data-color="#000000"></div>
                            <div class="color-dot" style="background: #F4EDE4;" data-color="#F4EDE4"></div>
                            <div class="color-dot" style="background: #E3F2FD;" data-color="#E3F2FD"></div>
                            <div class="color-dot" style="background: #E8F5E9;" data-color="#E8F5E9"></div>
                            <div class="color-dot" style="background: #F3E5F5;" data-color="#F3E5F5"></div>
                        </div>
                    </div>

                    <div class="input-box"><label>브랜드</label><input type="text" id="brandName" autocomplete="off"></div>
                    <div class="input-box"><label>브랜드 색상</label><input type="color" id="brandColor" value="#00126b"></div>
                    <div class="input-box full-row"><label>디바이스</label><input type="text" id="modelName" autocomplete="off" readonly></div>
                    
                    <div class="input-box"><label>ISO</label><input type="text" id="iso" autocomplete="off" readonly></div>
                    <div class="input-box"><label>초점 거리</label><input type="text" id="focal" autocomplete="off" readonly></div>
                    <div class="input-box"><label>조리개값</label><input type="text" id="fNumber" autocomplete="off" readonly></div>
                    <div class="input-box"><label>셔터 스피드</label><input type="text" id="shutter" autocomplete="off" readonly></div>
                    <div class="input-box"><label>촬영 날짜</label><input type="text" id="date" autocomplete="off" readonly></div>
                    <div class="input-box"><label>촬영 시각</label><input type="text" id="time" autocomplete="off" readonly></div>
                </div>
                <button id="download" class="btn-download" disabled>이미지 저장하기</button>
            </div>
        </div>
    </div>

    <script>
        const upload = document.getElementById('upload');
        const canvas = document.getElementById('mainCanvas');
        const ctx = canvas.getContext('2d');
        const downloadBtn = document.getElementById('download');
        const layoutType = document.getElementById('layoutType');
        let selectedBgColor = "#ffffff";
        let currentImg = null;

        const brandConfigs = {
            'APPLE': { name: 'Apple', color: '#8e8e93' },
            'SAMSUNG': { name: 'SAMSUNG', color: '#00126b' },
            'SONY': { name: 'SONY', color: '#000000' },
            'CANON': { name: 'Canon', color: '#ff0000' },
            'DEFAULT': { name: 'CAMERA', color: '#333333' }
        };

        const fields = ['brandName', 'brandColor', 'modelName', 'iso', 'focal', 'fNumber', 'shutter', 'date', 'time'];
        const inputs = {};
        fields.forEach(id => {
            inputs[id] = document.getElementById(id);
            inputs[id].addEventListener('input', () => { if(currentImg) draw(); });
        });

        layoutType.addEventListener('change', () => { if(currentImg) draw(); });

        document.querySelectorAll('.color-dot').forEach(dot => {
            dot.addEventListener('click', (e) => {
                document.querySelectorAll('.color-dot').forEach(d => d.classList.remove('active'));
                e.target.classList.add('active');
                selectedBgColor = e.target.dataset.color;
                if(currentImg) draw();
            });
        });

        function refineModelName(model) {
            if (!model) return "";
            const modelMap = {
                'SM-S928': 'S24 Ultra', 'SM-S926': 'S24+', 'SM-S921': 'S24',
                'SM-X910': 'Tab S9 Ultra', 'SM-X810': 'Tab S9+', 'SM-X710': 'Tab S9'
            };
            for (let id in modelMap) { if (model.toUpperCase().includes(id)) return modelMap[id]; }
            return model.replace(/samsung /i, "").trim();
        }

        upload.addEventListener('change', (e) => {
            const file = e.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = (event) => {
                const img = new Image();
                img.onload = () => {
                    currentImg = img;
                    EXIF.getData(img, function() {
                        const tags = EXIF.getAllTags(this);
                        const rawMake = (tags.Make || "").toUpperCase();
                        let matchedBrand = brandConfigs['DEFAULT'];
                        for (let key in brandConfigs) { if (rawMake.includes(key)) { matchedBrand = brandConfigs[key]; break; } }
                        
                        inputs.brandName.value = matchedBrand.name;
                        inputs.brandColor.value = matchedBrand.color;
                        const refinedModel = refineModelName(tags.Model || "");
                        inputs.modelName.value = refinedModel;
                        inputs.modelName.readOnly = refinedModel !== "";

                        const isoVal = tags.ISOSpeedRatings || "";
                        const focalVal = tags.FocalLengthIn35mmFilm ? tags.FocalLengthIn35mmFilm + "mm" : (tags.FocalLength ? Math.round(tags.FocalLength) + "mm" : "");
                        const fNumVal = tags.FNumber ? "F" + parseFloat(tags.FNumber).toFixed(1) : "";
                        const shutterVal = tags.ExposureTime ? (tags.ExposureTime < 1 ? `1/${Math.round(1/tags.ExposureTime)}` : tags.ExposureTime) : "";
                        
                        let dVal = "", tVal = "";
                        const rawDate = tags.DateTimeOriginal || tags.DateTime || "";
                        if (rawDate) {
                            const parts = rawDate.split(' ');
                            dVal = parts[0].replace(/:/g, '/');
                            tVal = parts[1].substring(0, 5);
                        }

                        inputs.iso.value = isoVal; inputs.iso.readOnly = isoVal === "";
                        inputs.focal.value = focalVal; inputs.focal.readOnly = focalVal === "";
                        inputs.fNumber.value = fNumVal; inputs.fNumber.readOnly = fNumVal === "";
                        inputs.shutter.value = shutterVal; inputs.shutter.readOnly = shutterVal === "";
                        inputs.date.value = dVal; inputs.date.readOnly = dVal === "";
                        inputs.time.value = tVal; inputs.time.readOnly = tVal === "";

                        document.getElementById('empty-msg').style.display = 'none';
                        document.getElementById('canvas-container').style.display = 'block';
                        draw();
                    });
                };
                img.src = event.target.result;
            };
            reader.readAsDataURL(file);
        });

        function draw() {
            if(!currentImg) return;
            const img = currentImg;
            const baseWidth = img.width;
            const imgPadding = baseWidth * 0.04; 
            const bottomSpace = baseWidth * 0.22; 
            canvas.width = baseWidth + (imgPadding * 2);
            canvas.height = img.height + imgPadding + bottomSpace;
            
            ctx.fillStyle = selectedBgColor;
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            ctx.drawImage(img, imgPadding, imgPadding, baseWidth, img.height);
            
            const sideMargin = imgPadding * 1.5; 
            const centerY = (img.height + imgPadding) + (bottomSpace * 0.48);
            const mainTextColor = selectedBgColor === "#000000" ? "#FFFFFF" : "#000000";
            const subTextColor = selectedBgColor === "#000000" ? "#CCCCCC" : "#666666";
            
            const spec = [inputs.iso.value ? `ISO ${inputs.iso.value}` : '', inputs.focal.value, inputs.fNumber.value, inputs.shutter.value].filter(Boolean).join('  ');
            const dateTime = [inputs.date.value, inputs.time.value].filter(Boolean).join('   ');

            ctx.textBaseline = "middle";

            // 폰트 설정 (Pretendard 사용)
            if (layoutType.value === 'default') {
                ctx.textAlign = "left";
                ctx.fillStyle = inputs.brandColor.value; 
                ctx.font = `900 ${baseWidth * 0.026}px "Pretendard"`;
                ctx.fillText(inputs.brandName.value, sideMargin, centerY - (bottomSpace * 0.15));
                ctx.fillStyle = mainTextColor; 
                ctx.font = `bold ${baseWidth * 0.042}px "Pretendard"`;
                ctx.fillText(inputs.modelName.value || " ", sideMargin, centerY + (bottomSpace * 0.08));

                ctx.textAlign = "right";
                ctx.fillStyle = mainTextColor; 
                ctx.font = `600 ${baseWidth * 0.021}px "Pretendard"`; 
                ctx.fillText(spec, canvas.width - sideMargin, centerY - (bottomSpace * 0.13));
                ctx.fillStyle = subTextColor; 
                ctx.font = `500 ${baseWidth * 0.019}px "Pretendard"`; 
                ctx.fillText(dateTime, canvas.width - sideMargin, centerY + (bottomSpace * 0.08));

            } else if (layoutType.value === 'modelFocus') {
                ctx.textAlign = "center";
                ctx.fillStyle = mainTextColor; 
                ctx.font = `900 ${baseWidth * 0.05}px "Pretendard"`;
                ctx.fillText(inputs.modelName.value || " ", canvas.width / 2, centerY - (bottomSpace * 0.05));
                
                const brandText = inputs.brandName.value;
                const infoText = spec ? `  |  ${spec}` : "";
                ctx.font = `bold ${baseWidth * 0.02}px "Pretendard"`;
                const totalWidth = ctx.measureText(brandText + infoText).width;
                let startX = (canvas.width - totalWidth) / 2;

                ctx.textAlign = "left";
                ctx.fillStyle = inputs.brandColor.value;
                ctx.fillText(brandText, startX, centerY + (bottomSpace * 0.22));
                ctx.fillStyle = subTextColor;
                ctx.fillText(infoText, startX + ctx.measureText(brandText).width, centerY + (bottomSpace * 0.22));

            } else if (layoutType.value === 'classicBar') {
                const adjustedY = centerY + (bottomSpace * 0.05);
                ctx.textAlign = "left";
                ctx.fillStyle = inputs.brandColor.value;
                ctx.font = `900 ${baseWidth * 0.03}px "Pretendard"`;
                ctx.fillText(inputs.brandName.value, sideMargin, adjustedY);
                const bWidth = ctx.measureText(inputs.brandName.value).width;
                ctx.fillStyle = mainTextColor;
                ctx.font = `500 ${baseWidth * 0.03}px "Pretendard"`;
                ctx.fillText(" | " + inputs.modelName.value, sideMargin + bWidth, adjustedY);

                ctx.textAlign = "right";
                ctx.fillStyle = subTextColor;
                ctx.font = `bold ${baseWidth * 0.022}px "Pretendard"`;
                const fullInfo = [spec, inputs.date.value].filter(Boolean).join('  ·  ');
                ctx.fillText(fullInfo, canvas.width - sideMargin, adjustedY);
            }
            downloadBtn.disabled = false;
        }

        downloadBtn.addEventListener('click', () => {
            const link = document.createElement('a');
            link.download = `Result_${inputs.modelName.value || 'photo'}.jpg`;
            link.href = canvas.toDataURL('image/jpeg', 0.98); 
            link.click();
        });
    </script>
</body>
</html>
