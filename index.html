<!DOCTYPE html>
<html lang="ko">
<head>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@800&family=Cinzel:wght@700&display=swap" rel="stylesheet">
    <link rel="shortcut icon" href="icon.ico" type="image/x-icon">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Watermark Editor</title>
    <link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css" />
    <script src="https://cdn.jsdelivr.net/npm/exif-js"></script>
    <style>
        :root { --primary: #007AFF; --insta: #E1306C; --bg: #f2f2f7; --sidebar-bg: #ffffff; --border: #e5e5ea; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        
        body { font-family: "Pretendard Variable", sans-serif; background: var(--bg); margin: 0; height: 100vh; overflow: hidden; }
        .main-container { display: flex; width: 100%; height: 100vh; }
        .preview-area { flex: 1; display: flex; align-items: center; justify-content: center; padding: 20px; background: #d1d1d6; overflow: hidden; }
        #canvas-container { max-width: 100%; max-height: 100%; display: none; box-shadow: 0 10px 40px rgba(0,0,0,0.2); }
        canvas { display: block; max-width: 100%; max-height: 85vh; width: auto; height: auto; border-radius: 4px; }
        
        .sidebar { width: 450px; background: var(--sidebar-bg); border-left: 1px solid #d1d1d6; padding: 30px; overflow-y: auto; }
        .form-wrapper { width: 100%; max-width: 380px; margin: 0 auto; }
        
        h3 { margin: 0 0 25px 0; font-size: 22px; text-align: center; font-weight: 800; letter-spacing: -0.5px; }
        .section-label { font-size: 10px; font-weight: 700; color: #a1a1a6; margin-bottom: 5px; display: block; text-transform: uppercase; }
        .upload-area { border: 2px dashed #aeaeb2; padding: 20px; border-radius: 12px; cursor: pointer; text-align: center; margin-bottom: 25px; display: block; font-weight: 600; color: #8e8e93; transition: 0.2s; }
        .upload-area:hover { background: #f5f5f7; border-color: var(--primary); }
        .style-mode-container { display: flex; gap: 8px; margin-bottom: 25px; flex-direction: column; }
        .mode-buttons { display: flex; gap: 8px; }
        .style-mode-btn { flex: 1; padding: 12px; border-radius: 8px; border: 1px solid var(--border); background: #f5f5f7; font-weight: 700; cursor: pointer; transition: 0.2s; font-size: 14px; }
        .style-mode-btn.active { background: #3a3a3c; color: white; border-color: #3a3a3c; }
        .layout-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 8px; margin-bottom: 25px; min-height: 180px; }
        .layout-btn { padding: 10px; border: 1px solid var(--border); border-radius: 8px; background: #f5f5f7; font-size: 13px; font-weight: 600; cursor: pointer; transition: all 0.2s; color: #3a3a3c; height: 45px; }
        .layout-btn.active { background: var(--primary); color: white; border-color: var(--primary); }
        .setting-section { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 20px; }
        .full-row { grid-column: span 2; }
        .input-box { display: flex; flex-direction: column; gap: 5px; }
        .input-box label { font-size: 10px; font-weight: 700; color: #a1a1a6; }
        input[type="text"] { padding: 12px; border: 1px solid var(--border); border-radius: 8px; font-size: 14px; background: #f5f5f7; width: 100%; outline: none; }
        input[type="text"]:read-only { background: #e5e5ea; color: #8e8e93; cursor: not-allowed; }
        input[type="color"] { width: 100%; height: 44px; border-radius: 8px; border: 1px solid var(--border); cursor: pointer; padding: 0; background: none; }
        .palette-container { display: grid; grid-template-columns: repeat(6, 1fr); gap: 6px; margin-top: 5px; }
        .color-dot { height: 30px; border-radius: 6px; cursor: pointer; border: 1px solid var(--border); transition: transform 0.1s; }
        .color-dot.active { border: 2.5px solid var(--primary); transform: scale(1.05); }
        .btn-group { display: flex; flex-direction: column; gap: 10px; margin-top: 20px; margin-bottom: 40px; }
        .btn-download { background: var(--primary); color: white; border: none; padding: 16px; border-radius: 12px; font-weight: 700; cursor: pointer; font-size: 16px; width: 100%; }
        .btn-share { background: var(--insta); color: white; border: none; padding: 16px; border-radius: 12px; font-weight: 700; cursor: pointer; font-size: 16px; width: 100%; }
        button:disabled { opacity: 0.3; cursor: not-allowed; }
        #toast { position: fixed; top: -100px; left: 50%; transform: translateX(-50%); background-color: rgba(0, 0, 0, 0.85); color: white; padding: 14px 28px; border-radius: 50px; font-size: 13px; font-weight: 600; z-index: 10005; opacity: 0; transition: all 0.4s; pointer-events: none; text-align: center; min-width: 280px; }
        #toast.show { opacity: 1; top: 40px; }

        @media (max-width: 768px) {
            body { overflow: auto; height: auto; }
            .main-container { flex-direction: column; height: auto; }
            .preview-area { position: sticky; top: 0; z-index: 10; height: 50vh; padding: 15px; background: #D2D2D2; }
            canvas { max-height: 45vh; }
            .sidebar { width: 100%; border-left: none; border-top: 1px solid #d1d1d6; padding: 20px; height: auto; }
        }
    </style>
</head>
<body>
    <div id="toast">Instagram을 선택해 Stories를 누르세요</div>
    <div class="main-container">
        <div class="preview-area">
            <div id="empty-msg"><p style="color:gray; font-weight:bold;">이미지를 업로드하세요.</p></div>
            <div id="canvas-container"><canvas id="mainCanvas"></canvas></div>
        </div>
        <div class="sidebar">
            <div class="form-wrapper">
                <h3>Watermark Editor</h3>
                <label class="upload-area"><input type="file" id="upload" accept="image/*" style="display:none">이미지 업로드</label>
                <div class="style-mode-container">
                    <span class="section-label">워터마크 스타일</span>
                    <div class="mode-buttons">
                        <button class="style-mode-btn active" id="mode-info">사진 정보</button>
                        <button class="style-mode-btn" id="mode-custom">문구 커스텀</button>
                    </div>
                </div>
                <div class="input-box full-row"><span class="section-label">레이아웃 스타일</span></div>
                <div class="layout-grid" id="layoutButtonGroup">
                    <button class="layout-btn active" data-value="default">기본</button>
                    <button class="layout-btn" data-value="modelFocus" id="focus-btn-text">디바이스 강조</button>
                    <button class="layout-btn" data-value="classicBar">클래식 바</button>
                    <button class="layout-btn" data-value="filmData">필름 레트로</button>
                    <button class="layout-btn" data-value="magazine">매거진</button>
                    <button class="layout-btn" data-value="polaroid">폴라로이드</button>
                    <button class="layout-btn" data-value="minimalBorder">심플 보더</button>
                </div>
                <div class="setting-section">
                    <div class="input-box full-row">
                        <label>배경 색상 팔레트</label>
                        <div class="palette-container" id="palette">
                            <div class="color-dot" style="background: #FCE4EC;" data-color="#FCE4EC"></div>
                            <div class="color-dot" style="background: #F4EDE4;" data-color="#F4EDE4"></div>
                            <div class="color-dot" style="background: #FFF9C4;" data-color="#FFF9C4"></div>
                            <div class="color-dot" style="background: #E8F5E9;" data-color="#E8F5E9"></div>
                            <div class="color-dot" style="background: #E3F2FD;" data-color="#E3F2FD"></div>
                            <div class="color-dot" style="background: #F3E5F5;" data-color="#F3E5F5"></div>
                            <div class="color-dot" style="background: #FF5252;" data-color="#FF5252"></div>
                            <div class="color-dot" style="background: #D7CCC8;" data-color="#D7CCC8"></div>
                            <div class="color-dot" style="background: #FFAB40;" data-color="#FFAB40"></div>
                            <div class="color-dot" style="background: #4CAF50;" data-color="#4CAF50"></div>
                            <div class="color-dot" style="background: #2196F3;" data-color="#2196F3"></div>
                            <div class="color-dot" style="background: #9C27B0;" data-color="#9C27B0"></div>
                            <div class="color-dot active" style="background: #FFFFFF;" data-color="#FFFFFF"></div>
                            <div class="color-dot" style="background: #F2F2F7;" data-color="#F2F2F7"></div>
                            <div class="color-dot" style="background: #E5E5E5;" data-color="#E5E5E5"></div>
                            <div class="color-dot" style="background: #8E8E93;" data-color="#8E8E93"></div>
                            <div class="color-dot" style="background: #3A3A3C;" data-color="#3A3A3C"></div>
                            <div class="color-dot" style="background: #000000;" data-color="#000000"></div>
                        </div>
                    </div>
                    <div class="input-box"><label id="main-color-label">브랜드 색상</label><input type="color" id="mainColor" value="#00126b"></div>
                    <div class="input-box"><label>텍스트 색상</label><input type="color" id="textColor" value="#000000"></div>
                    <div id="section-info" style="display: contents;">
                        <div class="input-box"><label>브랜드</label><input type="text" id="brandName"></div>
                        <div class="input-box"><label>디바이스</label><input type="text" id="modelName"></div>
                        <div class="input-box"><label>ISO</label><input type="text" id="iso"></div>
                        <div class="input-box"><label>초점 거리</label><input type="text" id="focal"></div>
                        <div class="input-box"><label>조리개</label><input type="text" id="fNumber"></div>
                        <div class="input-box"><label>셔터스피드</label><input type="text" id="shutter"></div>
                    </div>
                    <div id="section-custom" style="display: none;">
                        <div class="input-box full-row"><label>사용자 문구</label><input type="text" id="customText" placeholder="나만의 문구를 입력하세요"></div>
                    </div>
                    <div class="input-box"><label>촬영 날짜</label><input type="text" id="date"></div>
                    <div class="input-box"><label>촬영 시각</label><input type="text" id="time"></div>
                </div>
                <div class="btn-group">
                    <button id="download" class="btn-download" disabled>이미지 저장하기</button>
                    <button id="share" class="btn-share" disabled>스토리에 공유하기</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        const upload = document.getElementById('upload');
        const canvas = document.getElementById('mainCanvas');
        const ctx = canvas.getContext('2d');
        const downloadBtn = document.getElementById('download');
        const shareBtn = document.getElementById('share');
        const layoutButtons = document.querySelectorAll('.layout-btn');
        const focusBtnText = document.getElementById('focus-btn-text');
        const mainColorInput = document.getElementById('mainColor');
        const mainColorLabel = document.getElementById('main-color-label');
        const toast = document.getElementById('toast');
        
        let currentLayout = "default";
        let selectedBgColor = "#ffffff";
        let currentImg = null;
        let isCustomMode = false;
        let savedBrandColor = "#00126b";
        let savedCustomColor = "#000000";

        const btnInfo = document.getElementById('mode-info');
        const btnCustom = document.getElementById('mode-custom');
        const secInfo = document.getElementById('section-info');
        const secCustom = document.getElementById('section-custom');

        btnInfo.addEventListener('click', () => {
            if(!isCustomMode) return;
            savedCustomColor = mainColorInput.value;
            isCustomMode = false;
            btnInfo.classList.add('active'); btnCustom.classList.remove('active');
            secInfo.style.display = 'contents'; secCustom.style.display = 'none';
            focusBtnText.innerText = "디바이스 강조";
            mainColorLabel.innerText = "브랜드 색상";
            mainColorInput.value = savedBrandColor;
            if(currentImg) draw();
        });

        btnCustom.addEventListener('click', () => {
            if(isCustomMode) return;
            savedBrandColor = mainColorInput.value;
            isCustomMode = true;
            btnCustom.classList.add('active'); btnInfo.classList.remove('active');
            secInfo.style.display = 'none'; secCustom.style.display = 'contents';
            focusBtnText.innerText = "문구 강조";
            mainColorLabel.innerText = "문구 색상";
            mainColorInput.value = savedCustomColor;
            if(currentImg) draw();
        });

        const fields = ['brandName', 'mainColor', 'textColor', 'modelName', 'iso', 'focal', 'fNumber', 'shutter', 'date', 'time', 'customText'];
        const inputs = {};
        fields.forEach(id => {
            inputs[id] = document.getElementById(id);
            inputs[id].addEventListener('input', () => { if(currentImg) draw(); });
        });

        layoutButtons.forEach(btn => {
            btn.addEventListener('click', () => {
                layoutButtons.forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                currentLayout = btn.dataset.value;
                if(currentImg) draw();
            });
        });

        document.querySelectorAll('.color-dot').forEach(dot => {
            dot.addEventListener('click', (e) => {
                document.querySelectorAll('.color-dot').forEach(d => d.classList.remove('active'));
                e.target.classList.add('active');
                selectedBgColor = e.target.dataset.color;
                if(currentImg) draw();
            });
        });

        function getSoftenedColor(hex, opacity) {
            const r = parseInt(hex.slice(1, 3), 16);
            const g = parseInt(hex.slice(3, 5), 16);
            const b = parseInt(hex.slice(5, 7), 16);
            return `rgba(${r}, ${g}, ${b}, ${opacity})`;
        }

        function getBrandColor(brand) {
            const b = (brand || "").toUpperCase();
            if (b.includes('SONY')) return '#E25822';
            if (b.includes('CANON')) return '#BE0027';
            if (b.includes('NIKON')) return '#FFE100';
            if (b.includes('FUJIFILM')) return '#009944';
            if (b.includes('LEICA')) return '#E30613';
            if (b.includes('APPLE')) return '#555555';
            if (b.includes('SAMSUNG')) return '#074CA1';
            return '#00126b'; 
        }

        // 제약 조건 함수
        function applyModelConstraint(id, value) {
            inputs[id].value = value || "";
            inputs[id].readOnly = !!value; 
        }
        function applyInfoConstraint(id, value) {
            inputs[id].value = value || "";
            inputs[id].readOnly = !value; 
        }

        upload.addEventListener('change', (e) => {
            const file = e.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = (event) => {
                const img = new Image();
                img.onload = () => {
                    currentImg = img;
                    EXIF.getData(img, function() {
                        const tags = EXIF.getAllTags(this);
                        const brandRaw = tags.Make ? tags.Make.split(' ')[0] : "";
                        
                        applyModelConstraint('brandName', brandRaw);
                        applyModelConstraint('modelName', tags.Model);
                        
                        const autoBrandColor = getBrandColor(brandRaw);
                        savedBrandColor = autoBrandColor;
                        if(!isCustomMode) mainColorInput.value = autoBrandColor;

                        applyInfoConstraint('iso', tags.ISOSpeedRatings);
                        applyInfoConstraint('focal', tags.FocalLengthIn35mmFilm ? tags.FocalLengthIn35mmFilm + "mm" : "");
                        applyInfoConstraint('fNumber', tags.FNumber ? "F" + parseFloat(tags.FNumber).toFixed(1) : "");
                        const shutterVal = tags.ExposureTime ? (tags.ExposureTime < 1 ? `1/${Math.round(1/tags.ExposureTime)}` : tags.ExposureTime) : "";
                        applyInfoConstraint('shutter', shutterVal);

                        const rawDate = tags.DateTimeOriginal || "";
                        if (rawDate) {
                            const parts = rawDate.split(' ');
                            applyInfoConstraint('date', parts[0].replace(/:/g, '/'));
                            applyInfoConstraint('time', parts[1].substring(0, 5));
                        } else {
                            applyInfoConstraint('date', ""); applyInfoConstraint('time', "");
                        }

                        document.getElementById('empty-msg').style.display = 'none';
                        document.getElementById('canvas-container').style.display = 'block';
                        draw();
                    });
                };
                img.src = event.target.result;
            };
            reader.readAsDataURL(file);
        });

        function draw(targetCanvas = canvas) {
            if(!currentImg) return;
            const img = currentImg;
            const ctxRef = targetCanvas.getContext('2d');
            const baseWidth = img.width;
            let imgPadding = baseWidth * 0.04; 
            let bottomSpace = baseWidth * 0.22; 
            if(currentLayout === 'polaroid') { bottomSpace = baseWidth * 0.35; imgPadding = baseWidth * 0.06; }
            else if(currentLayout === 'minimalBorder') { bottomSpace = baseWidth * 0.08; imgPadding = baseWidth * 0.02; }

            targetCanvas.width = baseWidth + (imgPadding * 2);
            targetCanvas.height = img.height + imgPadding + bottomSpace;
            ctxRef.fillStyle = selectedBgColor;
            ctxRef.fillRect(0, 0, targetCanvas.width, targetCanvas.height);
            ctxRef.drawImage(img, imgPadding, imgPadding, baseWidth, img.height);
            
            const sideMargin = imgPadding * 1.5; 
            const centerY = (img.height + imgPadding) + ((targetCanvas.height - (img.height + imgPadding)) / 2);
            const highlightColor = mainColorInput.value;
            const otherTextColor = inputs.textColor.value;
            const softenedOtherColor = getSoftenedColor(otherTextColor, 0.6);

            const brand = isCustomMode ? "" : inputs.brandName.value;
            const model = isCustomMode ? "" : inputs.modelName.value;
            const mainText = isCustomMode ? inputs.customText.value : model;
            const exif = isCustomMode ? "" : [inputs.iso.value ? `ISO ${inputs.iso.value}` : '', inputs.focal.value, inputs.fNumber.value, inputs.shutter.value].filter(Boolean).join('  ');
            const dateTime = [inputs.date.value, inputs.time.value].filter(Boolean).join('    ');

            ctxRef.textBaseline = "middle";

            if (currentLayout === 'default') {
                ctxRef.textAlign = "left";
                ctxRef.fillStyle = isCustomMode ? otherTextColor : highlightColor; ctxRef.font = `600 ${baseWidth * 0.038}px "Pretendard"`;
                ctxRef.fillText(isCustomMode ? "" : brand, sideMargin, centerY - (bottomSpace * 0.18));
                ctxRef.fillStyle = isCustomMode ? highlightColor : otherTextColor; ctxRef.font = `bold ${baseWidth * 0.05}px "Pretendard"`;
                ctxRef.fillText(mainText, sideMargin, isCustomMode ? centerY : centerY + (bottomSpace * 0.04));
                ctxRef.textAlign = "right";
                ctxRef.fillStyle = otherTextColor; ctxRef.font = `600 ${baseWidth * 0.021}px "Montserrat"`; 
                ctxRef.fillText(exif, targetCanvas.width - sideMargin, centerY - (bottomSpace * 0.13));
                ctxRef.fillStyle = softenedOtherColor; ctxRef.font = `500 ${baseWidth * 0.019}px "Pretendard"`; 
                ctxRef.fillText(dateTime, targetCanvas.width - sideMargin, isCustomMode ? centerY : centerY + (bottomSpace * 0.04));
            } else if (currentLayout === 'modelFocus') {
                ctxRef.textAlign = "center";
                ctxRef.fillStyle = highlightColor; ctxRef.font = `900 ${baseWidth * 0.05}px "Pretendard"`;
                ctxRef.fillText(mainText, targetCanvas.width / 2, centerY - (bottomSpace * 0.05));
                ctxRef.font = `bold ${baseWidth * 0.02}px "Pretendard"`; ctxRef.fillStyle = softenedOtherColor; 
                ctxRef.fillText(isCustomMode ? dateTime : `${brand}  |  ${exif}`, targetCanvas.width / 2, centerY + (bottomSpace * 0.22));
            } else if (currentLayout === 'classicBar') {
                ctxRef.textAlign = "left";
                ctxRef.fillStyle = highlightColor; ctxRef.font = `900 ${baseWidth * 0.03}px "Pretendard"`;
                ctxRef.fillText(isCustomMode ? mainText : brand, sideMargin, centerY);
                if(!isCustomMode) {
                    const bW = ctxRef.measureText(brand).width;
                    ctxRef.fillStyle = otherTextColor; ctxRef.font = `500 ${baseWidth * 0.03}px "Pretendard"`;
                    ctxRef.fillText(" | " + model, sideMargin + bW, centerY);
                }
                ctxRef.textAlign = "right";
                ctxRef.fillStyle = softenedOtherColor; ctxRef.font = `bold ${baseWidth * 0.022}px "Pretendard"`;
                ctxRef.fillText([exif, inputs.date.value].filter(Boolean).join('  ·  '), targetCanvas.width - sideMargin, centerY);
            } else if (currentLayout === 'filmData') {
                ctxRef.textAlign = "right"; ctxRef.fillStyle = "#ff8c00"; ctxRef.font = `900 ${baseWidth * 0.032}px "Pretendard"`;
                ctxRef.fillText(inputs.date.value, targetCanvas.width - sideMargin, centerY - (bottomSpace * 0.05));
                ctxRef.font = `bold ${baseWidth * 0.022}px "Pretendard"`;
                ctxRef.fillText(isCustomMode ? mainText : [model, "ㅣ", exif].filter(Boolean).join(' '), targetCanvas.width - sideMargin, centerY + (bottomSpace * 0.15));
            } else if (currentLayout === 'magazine') {
                ctxRef.textAlign = "left"; ctxRef.fillStyle = highlightColor; ctxRef.font = `900 ${baseWidth * 0.06}px "Pretendard"`;
                const firstChar = isCustomMode ? (mainText[0] || "M") : (brand[0] || "C");
                ctxRef.fillText(firstChar, sideMargin, centerY);
                const initW = ctxRef.measureText(firstChar).width;
                ctxRef.fillStyle = otherTextColor; ctxRef.font = `bold ${baseWidth * 0.022}px "Pretendard"`;
                ctxRef.fillText(isCustomMode ? mainText.substring(1) : brand.substring(1), sideMargin + initW + 5, centerY - (bottomSpace * 0.08));
                ctxRef.font = `500 ${baseWidth * 0.018}px "Pretendard"`;
                ctxRef.fillText(isCustomMode ? dateTime : model, sideMargin + initW + 5, centerY + (bottomSpace * 0.08));
                ctxRef.textAlign = "right"; ctxRef.fillStyle = softenedOtherColor; ctxRef.font = `600 ${baseWidth * 0.02}px "Pretendard"`;
                ctxRef.fillText(exif, targetCanvas.width - sideMargin, centerY);
            } else if (currentLayout === 'polaroid') {
                ctxRef.textAlign = "center"; ctxRef.fillStyle = softenedOtherColor; ctxRef.font = `italic 500 ${baseWidth * 0.035}px "Pretendard"`;
                ctxRef.fillText(dateTime, targetCanvas.width / 2, centerY - (bottomSpace * 0.05));
                ctxRef.fillStyle = highlightColor; ctxRef.font = `bold ${baseWidth * 0.02}px "Pretendard"`;
                ctxRef.fillText(isCustomMode ? mainText : `${brand} ${model} ${exif}`, targetCanvas.width / 2, centerY + (bottomSpace * 0.15));
            } else if (currentLayout === 'minimalBorder') {
                ctxRef.textAlign = "right"; ctxRef.fillStyle = highlightColor; ctxRef.font = `500 ${baseWidth * 0.015}px "Pretendard"`;
                ctxRef.fillText(`${mainText}  ${exif}  ${inputs.date.value}`, targetCanvas.width - sideMargin, centerY);
            }
            downloadBtn.disabled = false; shareBtn.disabled = false;
        }

        downloadBtn.addEventListener('click', () => {
            const link = document.createElement('a');
            link.download = `Photo_${Date.now()}.jpg`;
            link.href = canvas.toDataURL('image/jpeg', 0.95); link.click();
        });

        // 인스타 스토리 공유 (원본 레이아웃 복구)
        shareBtn.addEventListener('click', async () => {
            try {
                toast.classList.add('show');
                const storyCanvas = document.createElement('canvas');
                const sCtx = storyCanvas.getContext('2d');
                storyCanvas.width = 1080; storyCanvas.height = 1920;
                
                // 배경 채우기 (밝은 회색)
                sCtx.fillStyle = '#F2F2F7';
                sCtx.fillRect(0, 0, 1080, 1920);

                const scale = (1080 * 0.7) / canvas.width;
                const sw = canvas.width * scale;
                const sh = canvas.height * scale;
                const sx = (1080 - sw) / 2;
                const sy = (1920 - sh) / 2;

                // 그림자 효과 복구
                sCtx.shadowColor = 'rgba(0,0,0,0.2)';
                sCtx.shadowBlur = 40;
                sCtx.shadowOffsetY = 20;
                sCtx.drawImage(canvas, sx, sy, sw, sh);

                const blob = await new Promise(resolve => storyCanvas.toBlob(resolve, 'image/jpeg', 0.95));
                const file = new File([blob], `Insta_Story_${Date.now()}.jpg`, { type: 'image/jpeg' });
                if (navigator.canShare && navigator.canShare({ files: [file] })) {
                    await navigator.share({ files: [file], title: 'Instagram Story' });
                }
            } catch (err) { console.error("공유 에러:", err); }
            finally { setTimeout(() => toast.classList.remove('show'), 2000); }
        });
    </script>
</body>
</html>
